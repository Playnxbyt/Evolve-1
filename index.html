<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>evolve</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <!-- Link to your new CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div class="blob1"></div>
  <div class="blob2"></div>

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="header">
      <div class="date-label" id="date-label"></div>
      <div class="header-row">
        <div class="logo-row">
          <div class="logo-wrap">
            <div class="logo-glow"></div>
            <svg width="52" height="64" viewBox="0 0 100 124" fill="none" style="position:relative;z-index:1">
              <defs>
                <linearGradient id="lg" x1="0" y1="0" x2="100" y2="124" gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#E879F9"/>
                  <stop offset="40%" stop-color="#A78BFA"/>
                  <stop offset="100%" stop-color="#2DD4BF"/>
                </linearGradient>
                <filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              </defs>
              <path d="M50 4C50 4 38 22 38 38C38 50 50 56 50 56C50 56 62 50 62 38C62 22 50 4 50 4Z" fill="url(#lg)" opacity=".95" filter="url(#gf)"/>
              <path d="M50 56C50 56 30 48 22 36C14 24 18 10 18 10C18 10 10 30 16 46C22 60 38 66 50 68Z" fill="url(#lg)" opacity=".85"/>
              <path d="M50 56C50 56 70 48 78 36C86 24 82 10 82 10C82 10 90 30 84 46C78 60 62 66 50 68Z" fill="url(#lg)" opacity=".85"/>
              <path d="M50 68C50 68 26 62 14 50C4 40 6 24 6 24C6 24-2 48 8 64C18 78 38 84 50 86Z" fill="url(#lg)" opacity=".7"/>
              <path d="M50 68C50 68 74 62 86 50C96 40 94 24 94 24C94 24 102 48 92 64C82 78 62 84 50 86Z" fill="url(#lg)" opacity=".7"/>
              <path d="M50 86C50 86 40 98 42 108C44 116 50 120 50 120C50 120 56 116 58 108C60 98 50 86 50 86Z" fill="url(#lg)" opacity=".6"/>
              <path d="M50 8C50 8 50 56 50 120" stroke="#08060F" stroke-width="3.5" stroke-linecap="round" opacity=".7"/>
              <path d="M34 22C38 36 44 50 50 68" stroke="#08060F" stroke-width="2.5" stroke-linecap="round" opacity=".5"/>
              <path d="M66 22C62 36 56 50 50 68" stroke="#08060F" stroke-width="2.5" stroke-linecap="round" opacity=".5"/>
              <path d="M18 38C28 52 38 66 50 86" stroke="#08060F" stroke-width="2" stroke-linecap="round" opacity=".4"/>
              <path d="M82 38C72 52 62 66 50 86" stroke="#08060F" stroke-width="2" stroke-linecap="round" opacity=".4"/>
            </svg>
          </div>
          <div>
            <div class="wordmark">evolve</div>
            <div class="tagline" id="tagline"></div>
          </div>
        </div>
        <div class="streak-badge">
          <span style="font-size:20px">🔥</span>
          <span class="streak-num" id="streak-num">0</span>
          <span class="streak-lbl">streak</span>
        </div>
      </div>
    </div>

    <!-- Ring Card -->
    <div class="ring-card">
      <div class="ring-card-inner">
        <div class="ring-wrap">
          <svg width="124" height="124" style="transform:rotate(-90deg)">
            <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#FF6B35"/></linearGradient></defs>
            <circle cx="62" cy="62" r="54" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
            <circle id="ring-progress" cx="62" cy="62" r="54" fill="none" stroke="url(#rg)" stroke-width="10" stroke-linecap="round" stroke-dasharray="0 339.3" style="transition:stroke-dasharray 1s cubic-bezier(.4,0,.2,1)"/>
          </svg>
          <div class="ring-center">
            <div class="ring-pct" id="ring-pct">0%</div>
            <div class="ring-lbl">done</div>
          </div>
        </div>
        <div style="flex:1">
          <div class="ring-title">Daily Progress</div>
          <div class="ring-sub" id="ring-sub">Start checking off your goals!</div>
          <div class="cat-pills" id="cat-pills"></div>
        </div>
      </div>
    </div>

    <!-- Category Cards -->
    <div class="cats" id="cats-list"></div>
  </div>

  <!-- MONTH VIEW -->
  <div class="view" id="view-month">
    <div class="cal-header">
      <div class="section-super">Monthly View</div>
      <div class="section-title">Calendar</div>
      <div class="month-nav">
        <button class="month-arrow" id="prev-month">‹</button>
        <span class="month-name" id="month-name"></span>
        <button class="month-arrow" id="next-month">›</button>
      </div>
      <div class="day-labels">
        <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div>
        <div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div>
        <div class="day-label">S</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="legend">
        <span>Less</span>
        <div class="legend-box" style="background:rgba(167,139,250,0.1)"></div>
        <div class="legend-box" style="background:rgba(167,139,250,0.3)"></div>
        <div class="legend-box" style="background:rgba(167,139,250,0.5)"></div>
        <div class="legend-box" style="background:rgba(167,139,250,0.8)"></div>
        <div class="legend-box" style="background:rgba(167,139,250,1)"></div>
        <span>More</span>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-box" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)">
        <div class="stat-num" style="color:#A78BFA" id="month-total">0</div>
        <div class="stat-lbl">goals this month</div>
      </div>
      <div class="stat-box" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)">
        <div style="font-size:22px" id="best-cat-emoji">—</div>
        <div style="font-size:12px;font-weight:600;margin-top:2px" id="best-cat-name">None yet</div>
        <div class="stat-lbl">best category</div>
      </div>
    </div>
    <div class="cat-bars" id="cat-bars"></div>
  </div>

  <!-- STATS VIEW -->
  <div class="view" id="view-stats">
    <div class="stats-wrap">
      <div class="section-super">Your</div>
      <div class="section-title section-title-green">Stats</div>
      <div class="streak-big" style="background:linear-gradient(135deg,rgba(255,107,53,0.15),rgba(255,107,53,0.05))">
        <div class="streak-big-icon">🔥</div>
        <div class="streak-big-num" id="stats-streak">0</div>
        <div class="streak-big-lbl">Day Streak</div>
      </div>
      <div class="stats-2col">
        <div class="stats-box" style="background:rgba(167,139,250,0.08);border-color:rgba(167,139,250,0.2)">
          <div class="stats-box-num" style="color:#A78BFA" id="stats-total-goals">0</div>
          <div class="stats-box-lbl">Total Goals</div>
        </div>
        <div class="stats-box" style="background:rgba(52,211,153,0.08);border-color:rgba(52,211,153,0.2)">
          <div class="stats-box-num" style="color:#34D399" id="stats-today-pct">0%</div>
          <div class="stats-box-lbl">Today</div>
        </div>
      </div>
      <div id="cat-stat-cards"></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="nav">
    <button class="nav-btn active" data-view="home">
      <span class="nav-icon">⚡</span>
      <span class="nav-label">Today</span>
      <div class="nav-dot" id="dot-home"></div>
    </button>
    <button class="nav-btn" data-view="month">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Calendar</span>
      <div class="nav-dot" id="dot-month" style="display:none"></div>
    </button>
    <button class="nav-btn" data-view="stats">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Stats</span>
      <div class="nav-dot" id="dot-stats" style="display:none"></div>
    </button>
  </div>

  <!-- Add Goal Modal -->
  <div class="modal-bg" id="modal">
    <div class="modal-sheet">
      <div class="modal-cat-row">
        <span class="modal-cat-emoji" id="modal-emoji"></span>
        <div>
          <div class="modal-label">Add to</div>
          <div class="modal-cat-name" id="modal-cat-name"></div>
        </div>
      </div>
      <input class="modal-input" id="modal-input" placeholder="e.g. 30 min workout, Read 10 pages..." />
      <button class="modal-add-btn" id="modal-add-btn">Add Goal ✓</button>
    </div>
  </div>
</div>

<!-- Link to your new JS file -->
<script src="script.js"></script>
</body>
</html>
